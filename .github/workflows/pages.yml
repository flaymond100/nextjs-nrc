name: Deploy SPA to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    # Build-time env vars come from repo secrets. Rename any existing
    # NEXT_PUBLIC_* secrets in repo Settings -> Secrets to the VITE_* names below.
    env:
      VITE_BASE_URL: ${{ secrets.VITE_BASE_URL }}
      VITE_MEASUREMENT_ID: ${{ secrets.VITE_MEASUREMENT_ID }}
      VITE_PUBLIC_KEY: ${{ secrets.VITE_PUBLIC_KEY }}
      VITE_SERVICE_ID: ${{ secrets.VITE_SERVICE_ID }}
      VITE_SITE_URL: ${{ secrets.VITE_SITE_URL }}
      VITE_SUPABASE_API_KEY: ${{ secrets.VITE_SUPABASE_API_KEY }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_TEMPLATE_ID: ${{ secrets.VITE_TEMPLATE_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
